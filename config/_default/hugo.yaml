# Site title
title: "Your Name - Academic CV"

# Base URL for your site
baseURL: "https://kamelliah.github.io/Kamellia/"

# Theme to use
theme: "hugo-blox-builder-theme"

# Site parameters
params:
  name: "Your Name"
  role: "Your Role (e.g., PhD Student, Researcher)"
  organization: "Your University or Institution"
  avatar: "media/avatar.jpg"  # Add your profile picture to the `assets/media/` folder
  description: "Your personal academic website showcasing your bio, portfolio, experience, and news."

# SEO and marketing settings
marketing:
  seo:
    site_type: Person
    description: "Your personal academic website showcasing your bio, portfolio, experience, and news."
    twitter: "YourTwitterHandle"  # Replace with your Twitter handle (if applicable)
  analytics:
    google_analytics: ""  # Add your Google Analytics tracking ID (if applicable)
  verification:
    google: ""  # Add your Google Search Console verification code (if applicable)

# Site features
features:
  math:
    enable: false  # Set to true if you need math rendering (e.g., LaTeX)
  privacy_pack:
    enable: false  # Set to true to enable privacy features (e.g., cookie consent)

# Localization settings
locale:
  date_format: "Jan 2, 2006"
  time_format: "3:04 PM"
